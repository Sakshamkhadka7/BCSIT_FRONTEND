<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>BCSIT Study Hub | Free Notes, Syllabus & Past Questions for BCSIT Students</title>
    <meta name="description" content="Free academic portal for BCSIT (Bachelor of Computer Science and Information Technology) students at Pokhara University. Access semester-wise notes, PU syllabus, past questions, quizzes, video guides and career resources — all in one place." />
    <meta name="keywords" content="BCSIT, CSIT, IT, BCSIT course, BCSIT notes, BCSIT syllabus, BCSIT past questions, Pokhara University BCSIT, Quest International College, BCSIT study materials, BCSIT exam, CSIT notes, IT course Nepal, bachelor IT Nepal, BCSIT question papers, BIT Nepal" />
    <meta name="author" content="BCSIT Study Hub — Quest International College Innovation Group" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://bcsitstudhub.com/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BCSIT Study Hub" />
    <meta property="og:title" content="BCSIT Study Hub | Free Notes, Syllabus & Past Questions" />
    <meta property="og:description" content="Free academic portal for BCSIT students at Pokhara University. Semester-wise notes, PU syllabus, past questions, quizzes and career guide — all free." />
    <meta property="og:url" content="https://bcsitstudhub.com/" />
    <meta property="og:image" content="https://bcsitstudhub.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BCSIT Study Hub — Free study resources for BCSIT students" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BCSIT Study Hub | Free Notes, Syllabus & Past Questions" />
    <meta name="twitter:description" content="Free academic portal for BCSIT students at Pokhara University. Notes, syllabus, past questions, quizzes and career guide." />
    <meta name="twitter:image" content="https://bcsitstudhub.com/og-image.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#4f46e5" />

    <!-- JSON-LD: WebSite with Sitelinks Searchbox -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "BCSIT Study Hub",
      "alternateName": ["BCSIT Hub", "CSIT Study Hub", "BCSIT Notes"],
      "url": "https://bcsitstudhub.com/",
      "description": "Free academic portal for BCSIT and CSIT students at Pokhara University, Nepal. Access notes, syllabus, past questions, quizzes and career resources.",
      "inLanguage": "en",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://bcsitstudhub.com/notes?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: EducationalOrganization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "BCSIT Study Hub",
      "url": "https://bcsitstudhub.com/",
      "logo": "https://bcsitstudhub.com/favicon.svg",
      "description": "BCSIT Study Hub is a free academic resource portal built for students of Bachelor of Computer Science and Information Technology (BCSIT) at Pokhara University, Nepal.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "NP",
        "addressLocality": "Pokhara"
      },
      "sameAs": [],
      "teaches": "Bachelor of Computer Science and Information Technology (BCSIT)",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "BCSIT Study Resources",
        "itemListElement": [
          { "@type": "Course", "name": "BCSIT Semester I Notes",    "description": "Study notes for BCSIT Semester I subjects" },
          { "@type": "Course", "name": "BCSIT Semester II Notes",   "description": "Study notes for BCSIT Semester II subjects" },
          { "@type": "Course", "name": "BCSIT Semester III Notes",  "description": "Study notes for BCSIT Semester III subjects" },
          { "@type": "Course", "name": "BCSIT Semester IV Notes",   "description": "Study notes for BCSIT Semester IV subjects" },
          { "@type": "Course", "name": "BCSIT Semester V Notes",    "description": "Study notes for BCSIT Semester V subjects" },
          { "@type": "Course", "name": "BCSIT Semester VI Notes",   "description": "Study notes for BCSIT Semester VI subjects" },
          { "@type": "Course", "name": "BCSIT Semester VII Notes",  "description": "Study notes for BCSIT Semester VII subjects" },
          { "@type": "Course", "name": "BCSIT Semester VIII Notes", "description": "Study notes for BCSIT Semester VIII subjects" }
        ]
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <div id="root"></div>

  </body>
</html>
